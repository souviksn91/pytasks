{% extends 'base.html' %} {% block content %}
<h1>Your Categories</h1>
<a href="{% url 'tasks:category_create' %}">Add New Category</a> {% for category in categories %}
<div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
    <h3>{{ category.name }}</h3>
</div>
{% empty %}
<p>No categories yet. <a href="{% url 'tasks:category_create' %}">Add your first category!</a></p>
{% endfor %} {% endblock %}
