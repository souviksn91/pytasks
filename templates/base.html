<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PyTasks - Your Simple Task Manager</title>
</head>

<body>
    <header>
        <nav>
            <a href="{% url 'tasks:dashboard' %}">Dashboard</a> |
            <a href="#">All Categories</a> |
            <a href="#">Add Category</a> |
            <a href="#">Add Task</a> | {% if user.is_authenticated %}
            <form action="{% url 'accounts:logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: #007bff; cursor: pointer; text-decoration: underline; padding: 0; font: inherit;">Logout ({{ user.username }})</button>
            </form>
            {% else %}
            <a href="{% url 'accounts:login' %}">Login</a> |
            <a href="{% url 'accounts:signup' %}">Sign Up</a> {% endif %}
        </nav>
    </header>
    <hr>
    <main>
        {% block content %}
        <!-- Content from child templates will go here -->
        {% endblock %}
    </main>
</body>

</html>
